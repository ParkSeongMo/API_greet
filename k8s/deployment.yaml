apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-greet
  namespace: uplus-mready-model
  labels:
    app: fastapi-greet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-greet
  template:
    metadata:
      labels:
        app: fastapi-greet
    spec:
      # Harbor 등 비공개 레지스트리 사용 시 아래 주석을 해제하고 시크릿 이름을 맞춥니다.
      imagePullSecrets:
        - name: harbor
      containers:
        - name: app
          image: dev.pineone.com:20444/uplus-mready/fastapi-greet:sha-195e8b7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

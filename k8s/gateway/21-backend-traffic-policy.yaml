# 파일: 21-backend-traffic-policy.yaml
# 역할: parksmo-textvision-gateway용 BackendTrafficPolicy (rate limit 등 백엔드 트래픽 설정을 이 파일에 모음)
#
# --- global rate limit ---
# 전제 조건(필수):
# - Envoy Gateway(gateway-helm)에 rateLimit 백엔드로 Redis가 설정돼 있어야 합니다.
# - Helm 릴리스 이름은 클러스터마다 다름. 본 환경: eg-ai / NS: uplus-mready-gateway
#   (Redis는 uplus-mready-gateway NS에 두고, URL에 Service FQDN 사용)
# - Redis가 AUTH 사용 시(NOAUTH 로그): userinfo에 비밀번호 포함. Bitnami는 Secret의
#   redis-password 등을 참고. 비밀번호에 ! 등 예약 문자가 있으면 URL 인코딩(예: ! → %21).
# - 적용 예(비밀번호는 실제 값으로 치환. 저장소/티켓에 평문/인코딩값 커밋 금지):
#     helm upgrade eg-ai oci://docker.io/envoyproxy/gateway-helm \
#       --kube-insecure-skip-tls-verify \
#       --set config.envoyGateway.rateLimit.backend.type=Redis \
#       --set config.envoyGateway.rateLimit.failClosed=true \ -> 정책에 따라 적용여부 판다
#       --set-string config.envoyGateway.rateLimit.backend.redis.url='redis://:<URLENCODED_PASSWORD>@redis-master.uplus-mready-gateway.svc.cluster.local:6379/0' \
#       --reuse-values \
#       -n uplus-mready-gateway
#
# - Redis 장애/네트워크 단절 등으로 ratelimit 서버 응답을 받을 수 없을 때,
#   위 `config.envoyGateway.rateLimit.failClosed=true` 를 설정하면 요청을 통과시키지 않고 HTTP 500을 반환합니다(fail-closed).
#   이 설정을 하지 않을 경우 허용처리
#   참고 사이트 https://gateway.envoyproxy.io/v1.6/api/extension_types/#
#
#     <URLENCODED_PASSWORD> 예: "!"는 "%21" (실제 값은 Secret에서 확인)
# - AUTH 없는 Redis만 쓸 때는 host:6379 형태도 가능하나, 운영 Redis는 대부분 AUTH 필요.
# - 설정 후 envoy-ratelimit 파드가 Running인지 확인. Redis 미설정 시 정책이 동작하지 않을 수 있음.
#
# 서비스별로 명확하게 rate limit을 분리하기 위해,
# - Gateway 대상: "전역 세이프가드" (전체 트래픽 상한)
# - HTTPRoute 대상: "서비스별" (각 라우트별 상한)
# 으로 정책을 분리합니다.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: parksmo-textvision-backend-traffic-policy
  namespace: uplus-mready-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: parksmo-textvision-gateway
  rateLimit:
    global:
      rules:
        - limit:
            requests: 150
            unit: Minute 
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: parksmo-textvision-test-api1-backend-traffic-policy
  namespace: uplus-mready-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: parksmo-textvision-test-api1-route
  rateLimit:
    global:
      rules:
        - limit:
            requests: 10
            unit: Minute
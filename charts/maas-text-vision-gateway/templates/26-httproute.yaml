apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ .Values.namespaces.gateway }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    {{- include "maas-text-vision-gateway.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix | quote }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.httpRoute.backend.serviceName }}
          port: {{ .Values.httpRoute.backend.port }}
          namespace: {{ .Values.namespaces.model }}

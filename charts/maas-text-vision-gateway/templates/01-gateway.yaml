apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespaces.gateway }}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  labels:
    {{- include "maas-text-vision-gateway.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  listeners:
    {{- toYaml .Values.gateway.listeners | nindent 4 }}

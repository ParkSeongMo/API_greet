# Argo CD Application (Helm)
# 클러스터에 적용:
#   k apply -n argocd -f argocd/application.yaml
#
# 사전 조건:
# - Argo CD가 argocd 네임스페이스에 설치되어 있을 것
# - spec.source.repoURL / targetRevision 을 본인 GitHub 저장소·브랜치(또는 태그)로 수정
# - uplus-mready-gateway, uplus-mready-model 네임스페이스는 클러스터에 미리 있거나
#   별도로 생성 (CreateNamespace는 Argo destination.namespace 하나만 자동 생성)
# - Ingress의 Envoy Service 이름(values.yaml의 ingress.rules)은 클러스터마다 다름 — 배포 전 확인
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maas-text-vision-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Pineone-iOS/maas-text-vision-gateway.git
    targetRevision: parksmo
    path: charts/maas-text-vision-gateway
    helm:
      releaseName: maas-text-vision-gateway
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    # Ingress 등 metadata.namespace가 없는 리소스의 기본 네임스페이스
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
